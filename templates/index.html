<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcTape Audit - BPK RI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0f2f5}
        .mono{font-family:'JetBrains Mono',monospace}
        .gradient-text{background:linear-gradient(135deg,#4c6ef5,#5c7cfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .tape-col{background:#fffff8;border:1px solid #e9ecef;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.04);min-width:280px;display:flex;flex-direction:column;height:calc(100vh - 160px)}
        .tape-header{background:linear-gradient(135deg,#4c6ef5,#748ffc);color:#fff;padding:8px 12px;border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:between;gap:8px}
        .tape-body{flex:1;overflow-y:auto;padding:0}
        .tape-body::-webkit-scrollbar{width:4px}
        .tape-body::-webkit-scrollbar-thumb{background:#dbe4ff;border-radius:2px}
        .tape-row{display:flex;border-bottom:1px dashed #f1f3f5;padding:2px 10px;font-family:'JetBrains Mono',monospace;font-size:13px;align-items:center}
        .tape-row:hover{background:#f8f9fa}
        .tape-row .op{width:20px;text-align:center;font-weight:700;flex-shrink:0}
        .tape-row .val{flex:1;text-align:right;padding-right:4px}
        .tape-row .comment{font-size:10px;color:#adb5bd;font-family:'Plus Jakarta Sans',sans-serif;padding-left:24px;cursor:text}
        .tape-row.subtotal-row{background:#edf2ff;font-weight:700;border-bottom:2px solid #4c6ef5}
        .tape-row.subtotal-row .val{color:#4c6ef5}
        .tape-total{background:#4c6ef5;color:#fff;padding:10px 12px;border-radius:0 0 12px 12px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-weight:700}
        .tape-input-area{background:#fff;border-top:1px solid #e9ecef;padding:8px 10px}
        .tape-input{width:100%;background:transparent;outline:none;font-family:'JetBrains Mono',monospace;font-size:18px;text-align:right;font-weight:600}
        .tape-input::placeholder{color:#dee2e6}
        .btn-sm{padding:4px 8px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s}
        .tab-bar{display:flex;gap:4px;align-items:center;overflow-x:auto;padding:4px 0}
        .tab-item{padding:4px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
        .tab-item.active{background:#4c6ef5;color:#fff}
        .tab-item:not(.active){background:#e9ecef;color:#868e96}
        .tab-item:not(.active):hover{background:#dee2e6}
        @media print{.no-print{display:none!important}.tape-col{height:auto!important;break-inside:avoid}}
        @media(max-width:768px){.tape-col{min-width:100%;height:calc(100vh - 200px)}}
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 no-print">
        <div class="max-w-7xl mx-auto px-3 py-2 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <img src="/static/bpk-logo.png" alt="BPK" class="w-7 h-7 object-contain">
                <span class="text-sm font-bold gradient-text">CalcTape Audit</span>
                <span class="text-[10px] text-gray-400">by Bashid Effendi</span>
            </div>
            <div class="flex items-center gap-1">
                <button onclick="addTapeCol()" title="Tambah Kolom" class="btn-sm bg-blue-50 text-blue-600 hover:bg-blue-100">+ Kolom</button>
                <button onclick="exportAllCSV()" title="Export CSV" class="btn-sm bg-green-50 text-green-600 hover:bg-green-100">Export</button>
                <button onclick="window.print()" title="Print" class="btn-sm bg-gray-50 text-gray-600 hover:bg-gray-100">Print</button>
                <button onclick="saveAll()" title="Simpan (Ctrl+S)" class="btn-sm bg-purple-50 text-purple-600 hover:bg-purple-100">Simpan</button>
            </div>
        </div>
        <!-- Saved tapes tabs -->
        <div class="max-w-7xl mx-auto px-3 pb-2">
            <div class="tab-bar" id="tabBar">
                <button onclick="newSession()" class="btn-sm bg-gray-100 text-gray-500 hover:bg-gray-200 mr-1" title="Sesi Baru">+</button>
            </div>
        </div>
    </header>

    <!-- Tape Columns -->
    <main class="max-w-7xl mx-auto px-3 py-3">
        <div class="flex gap-3 overflow-x-auto pb-2" id="tapeColumns"></div>
    </main>

<script>
// ============================================================
// DATA MODEL
// ============================================================
let session = {
    id: Date.now().toString(36),
    name: 'Perhitungan 1',
    columns: [createColumn('Kolom 1')],
};

function createColumn(name) {
    return {
        id: Date.now().toString(36) + Math.random().toString(36).substr(2,4),
        name: name || 'Kolom',
        rows: [], // [{value, op, comment}]
    };
}

// ============================================================
// RENDER
// ============================================================
function render() {
    const container = document.getElementById('tapeColumns');
    container.innerHTML = '';

    session.columns.forEach((col, ci) => {
        const total = calcTotal(col.rows);
        const div = document.createElement('div');
        div.className = 'tape-col';
        div.innerHTML = `
            <div class="tape-header">
                <input type="text" value="${esc(col.name)}" onchange="session.columns[${ci}].name=this.value;autoSave()" class="bg-transparent outline-none text-sm font-bold text-white flex-1 min-w-0" placeholder="Nama kolom">
                <button onclick="removeTapeCol(${ci})" class="text-white/50 hover:text-white text-xs" title="Hapus kolom">&times;</button>
            </div>
            <div class="tape-body" id="tapeBody${ci}">
                ${renderRows(col.rows, ci)}
            </div>
            <div class="tape-total">
                <span class="text-xs text-white/70">TOTAL</span>
                <span class="text-lg">${fmtRp(total)}</span>
            </div>
            <div class="tape-input-area">
                <input type="text" class="tape-input" id="input${ci}" placeholder="0"
                    onkeydown="handleKey(event,${ci})" autofocus>
                <div class="flex justify-between mt-1">
                    <span class="text-[9px] text-gray-400">Enter=tambah · -Enter=kurang · *Enter=kali · /Enter=bagi</span>
                    <button onclick="addSubtotal(${ci})" class="text-[10px] text-blue-500 font-bold hover:text-blue-700">Subtotal</button>
                </div>
            </div>
        `;
        container.appendChild(div);

        // Scroll to bottom
        const body = document.getElementById('tapeBody' + ci);
        body.scrollTop = body.scrollHeight;
    });

    // Focus first input if exists
    if (session.columns.length) {
        const firstInput = document.getElementById('input0');
        if (firstInput) firstInput.focus();
    }
}

function renderRows(rows, ci) {
    if (!rows.length) return '<div class="text-center py-8 text-gray-300 text-xs">Ketik angka lalu Enter</div>';

    let html = '';
    let running = 0;

    rows.forEach((r, ri) => {
        if (r.type === 'subtotal') {
            html += `<div class="tape-row subtotal-row">
                <span class="op">=</span>
                <span class="val">${fmtNum(running)}</span>
                <button onclick="deleteRow(${ci},${ri})" class="text-gray-300 hover:text-red-400 ml-1 text-xs no-print">&times;</button>
            </div>`;
        } else {
            running = applyOp(running, r.op, r.value);
            const opSymbol = {'+':'+','−':'-','-':'−','*':'×','/':'÷'}[r.op] || r.op;
            const opColor = r.op === '+' ? 'text-green-600' : r.op === '-' ? 'text-red-500' : r.op === '*' ? 'text-blue-600' : 'text-amber-600';

            html += `<div class="tape-row">
                <span class="op ${opColor}">${opSymbol}</span>
                <span class="val">${fmtNum(r.value)}</span>
                <button onclick="deleteRow(${ci},${ri})" class="text-gray-200 hover:text-red-400 ml-1 text-xs no-print">&times;</button>
            </div>`;
            if (r.comment) {
                html += `<div class="tape-row"><span class="comment">${esc(r.comment)}</span></div>`;
            }
        }
    });
    return html;
}

// ============================================================
// INPUT HANDLING
// ============================================================
function handleKey(e, ci) {
    if (e.key === 'Enter') {
        e.preventDefault();
        const input = document.getElementById('input' + ci);
        let raw = input.value.trim();
        if (!raw) return;

        // Detect operator prefix: -500, *2, /3
        let op = '+';
        if (raw.startsWith('−') || (raw.startsWith('-') && raw.length > 1 && raw[1] !== '.')) {
            // Check if it's negative number or subtract
            if (raw.match(/^[-−]\d/)) {
                op = '-';
                raw = raw.substring(1);
            }
        }
        if (raw.startsWith('*') || raw.startsWith('×')) { op = '*'; raw = raw.substring(1); }
        if (raw.startsWith('/') || raw.startsWith('÷')) { op = '/'; raw = raw.substring(1); }

        // Shift+Enter = subtract
        if (e.shiftKey && op === '+') op = '-';

        const val = parseFloat(raw.replace(/[^0-9.\-]/g, ''));
        if (isNaN(val)) return;

        session.columns[ci].rows.push({ value: val, op: op, comment: '', type: 'entry' });
        input.value = '';
        render();
        autoSave();

        // Re-focus this column's input
        setTimeout(() => {
            const inp = document.getElementById('input' + ci);
            if (inp) inp.focus();
        }, 10);
    }

    // Tab = move to next column
    if (e.key === 'Tab') {
        e.preventDefault();
        const nextCi = e.shiftKey ? ci - 1 : ci + 1;
        if (nextCi >= 0 && nextCi < session.columns.length) {
            const nextInput = document.getElementById('input' + nextCi);
            if (nextInput) nextInput.focus();
        } else if (nextCi >= session.columns.length) {
            addTapeCol();
            setTimeout(() => {
                const newInput = document.getElementById('input' + (session.columns.length - 1));
                if (newInput) newInput.focus();
            }, 50);
        }
    }
}

function addSubtotal(ci) {
    session.columns[ci].rows.push({ type: 'subtotal' });
    render();
    autoSave();
    setTimeout(() => {
        const inp = document.getElementById('input' + ci);
        if (inp) inp.focus();
    }, 10);
}

function deleteRow(ci, ri) {
    session.columns[ci].rows.splice(ri, 1);
    render();
    autoSave();
}

// ============================================================
// COLUMN MANAGEMENT
// ============================================================
function addTapeCol() {
    const num = session.columns.length + 1;
    session.columns.push(createColumn('Kolom ' + num));
    render();
    autoSave();
}

function removeTapeCol(ci) {
    if (session.columns.length <= 1) return;
    if (session.columns[ci].rows.length && !confirm('Hapus kolom ini?')) return;
    session.columns.splice(ci, 1);
    render();
    autoSave();
}

// ============================================================
// CALCULATION
// ============================================================
function calcTotal(rows) {
    let total = 0;
    rows.forEach(r => {
        if (r.type === 'subtotal') return;
        total = applyOp(total, r.op, r.value);
    });
    return total;
}

function applyOp(total, op, value) {
    switch(op) {
        case '+': return total + value;
        case '-': return total - value;
        case '*': return total * value;
        case '/': return value !== 0 ? total / value : total;
        default: return total + value;
    }
}

// ============================================================
// SAVE / LOAD
// ============================================================
function autoSave() {
    localStorage.setItem('calctape_session', JSON.stringify(session));
    renderTabs();
}

function saveAll() {
    const saved = JSON.parse(localStorage.getItem('calctape_saved') || '[]');
    const idx = saved.findIndex(s => s.id === session.id);
    const data = JSON.parse(JSON.stringify(session));
    data.savedAt = new Date().toISOString();
    if (idx >= 0) saved[idx] = data;
    else saved.unshift(data);
    localStorage.setItem('calctape_saved', JSON.stringify(saved.slice(0, 30)));
    renderTabs();
    showToast('Tersimpan!');
}

function loadSession(id) {
    const saved = JSON.parse(localStorage.getItem('calctape_saved') || '[]');
    const item = saved.find(s => s.id === id);
    if (!item) return;
    session = JSON.parse(JSON.stringify(item));
    render();
    autoSave();
}

function newSession() {
    session = {
        id: Date.now().toString(36),
        name: 'Perhitungan ' + (JSON.parse(localStorage.getItem('calctape_saved') || '[]').length + 1),
        columns: [createColumn('Kolom 1')],
    };
    render();
    autoSave();
}

function deleteSession(id) {
    let saved = JSON.parse(localStorage.getItem('calctape_saved') || '[]');
    saved = saved.filter(s => s.id !== id);
    localStorage.setItem('calctape_saved', JSON.stringify(saved));
    if (session.id === id) newSession();
    renderTabs();
}

function renderTabs() {
    const saved = JSON.parse(localStorage.getItem('calctape_saved') || '[]');
    const bar = document.getElementById('tabBar');
    let html = '<button onclick="newSession()" class="btn-sm bg-gray-100 text-gray-500 hover:bg-gray-200 mr-1" title="Sesi Baru">+</button>';

    // Current session
    html += `<div class="tab-item active" ondblclick="promptRename()">${esc(session.name)}</div>`;

    // Saved sessions
    saved.forEach(s => {
        if (s.id === session.id) return;
        const cols = (s.columns || []).length;
        html += `<div class="tab-item" onclick="loadSession('${s.id}')" title="Klik untuk buka">${esc(s.name)} <button onclick="event.stopPropagation();deleteSession('${s.id}')" class="text-gray-400 hover:text-red-500 ml-1">&times;</button></div>`;
    });

    bar.innerHTML = html;
}

function promptRename() {
    const name = prompt('Nama sesi:', session.name);
    if (name) { session.name = name; autoSave(); renderTabs(); }
}

// ============================================================
// EXPORT
// ============================================================
function exportAllCSV() {
    let csv = '';
    session.columns.forEach((col, ci) => {
        csv += `\n=== ${col.name} ===\n`;
        csv += 'Op,Nilai,Running Total\n';
        let running = 0;
        col.rows.forEach(r => {
            if (r.type === 'subtotal') {
                csv += `=,${running},${running}\n`;
            } else {
                running = applyOp(running, r.op, r.value);
                csv += `${r.op},${r.value},${running}\n`;
                if (r.comment) csv += `,"${r.comment}",\n`;
            }
        });
        csv += `TOTAL,,${running}\n`;
    });

    const blob = new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (session.name || 'CalcTape').replace(/[^a-zA-Z0-9 ]/g, '_') + '.csv';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Exported!');
}

// ============================================================
// HELPERS
// ============================================================
function fmtNum(n) {
    if (n === 0) return '0';
    const rounded = Math.round(n * 100) / 100;
    return rounded.toLocaleString('id-ID', {minimumFractionDigits: rounded % 1 ? 2 : 0});
}
function fmtRp(n) {
    if (n === 0) return '0';
    const abs = Math.abs(Math.round(n * 100) / 100);
    const formatted = abs.toLocaleString('id-ID', {minimumFractionDigits: abs % 1 ? 2 : 0});
    return n < 0 ? '(' + formatted + ')' : formatted;
}
function esc(s) { return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'fixed bottom-4 right-4 bg-blue-600 text-white text-sm font-semibold px-4 py-2 rounded-xl shadow-lg z-50';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 1500);
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveAll(); }
    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); /* TODO: undo */ }
});

// ============================================================
// INIT
// ============================================================
const saved = localStorage.getItem('calctape_session');
if (saved) {
    try { session = JSON.parse(saved); } catch(e) {}
}
render();
renderTabs();
</script>
</body>
</html>
